name: Build Worker Image

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Additional version tag (e.g. v1.2.3). Optional.'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          TAGS="ghcr.io/${{ github.repository_owner }}/omb-worker:${{ github.sha }}"
          TAGS="${TAGS},ghcr.io/${{ github.repository_owner }}/omb-worker:latest"
          if [[ -n "${{ inputs.version }}" ]]; then
            TAGS="${TAGS},ghcr.io/${{ github.repository_owner }}/omb-worker:${{ inputs.version }}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
