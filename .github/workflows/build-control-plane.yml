name: Build Control Plane Image

on:
  push:
    branches: [main]
    paths:
      - 'control-plane/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: control-plane/frontend/package-lock.json

      - name: Build React frontend
        working-directory: control-plane/frontend
        run: |
          npm ci
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push control plane image
        uses: docker/build-push-action@v5
        with:
          context: ./control-plane
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/omb-control-plane:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/omb-control-plane:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
