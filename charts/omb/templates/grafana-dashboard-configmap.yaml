{{- if .Values.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: omb-redpanda-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    app: omb-redpanda-dashboard
    grafana_dashboard: "1"
    grafana_folder: "Redpanda"
data:
  redpanda.json: |-
{{ .Files.Get "dashboards/redpanda.json" | indent 4 }}
{{- end }}
