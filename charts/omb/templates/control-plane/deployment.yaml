apiVersion: apps/v1
kind: Deployment
metadata:
  name: omb-control-plane
  labels:
    app: omb-control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: omb-control-plane
  template:
    metadata:
      labels:
        app: omb-control-plane
    spec:
      serviceAccountName: omb-control-plane
      containers:
        - name: control-plane
          image: "{{ .Values.controlPlane.image.repository }}:{{ .Values.controlPlane.image.tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: OMB_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: OMB_WORKER_REPLICAS
              value: "{{ .Values.worker.replicas }}"
            - name: OMB_DB_PATH
              value: /data/omb_ui.db
            - name: PORT
              value: "8000"
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: omb-control-plane-data
