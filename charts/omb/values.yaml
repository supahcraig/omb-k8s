worker:
  replicas: 2
  image:
    repository: ghcr.io/supahcraig/omb-worker
    tag: latest
  resources:
    cpu: "4"
    memory: "8Gi"

controlPlane:
  image:
    repository: ghcr.io/supahcraig/omb-control-plane
    tag: latest
  # Fernet encryption key for passwords at rest (base64-encoded 32-byte key).
  # Generate with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
  # If empty, an ephemeral key is generated at startup — passwords will not
  # survive pod restarts. Set this before saving any credentials.
  encryptionKey: ""

storage:
  storageClassName: ""
  size: 10Gi
  createStorageClass: false

prometheus:
  enabled: true

clusterAutoscaler:
  enabled: false
  clusterName: ""
  region: ""
  roleArn: ""

driverJob:
  enabled: false

# kube-prometheus-stack subchart values
kube-prometheus-stack:
  alertmanager:
    enabled: false
  prometheus:
    prometheusSpec:
      nodeSelector:
        node-pool: control-plane
      additionalScrapeConfigsSecret:
        enabled: true
        name: omb-prometheus-additional-scrape-configs
        key: additional-scrape-configs.yaml
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 500m
          memory: 1Gi
      retention: 6h
  grafana:
    nodeSelector:
      node-pool: control-plane
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    adminPassword: admin
  prometheusOperator:
    nodeSelector:
      node-pool: control-plane
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
  kube-state-metrics:
    nodeSelector:
      node-pool: control-plane
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
  prometheus-node-exporter:
    # DaemonSet — no nodeSelector, must run on all nodes including tainted workers.
    tolerations:
      - key: dedicated
        operator: Equal
        value: benchmark
        effect: NoSchedule
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
