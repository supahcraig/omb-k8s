worker:
  replicas: 2
  port: 9080
  image:
    repository: ghcr.io/supahcraig/omb-worker
    tag: latest
  resources:
    cpu: "4"
    memory: "8Gi"

controlPlane:
  image:
    repository: ghcr.io/supahcraig/omb-control-plane
    tag: latest
  # Fernet encryption key for passwords at rest (base64-encoded 32-byte key).
  # Generate with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
  # If empty, an ephemeral key is generated at startup — passwords will not
  # survive pod restarts. Set this before saving any credentials.
  encryptionKey: ""
  # List of CIDRs allowed to reach the control-plane UI via the LoadBalancer.
  # Defaults to open (0.0.0.0/0). Pass your Terraform operator IP at deploy time:
  #   helm install omb ... --set 'controlPlane.allowedCIDRs[0]=1.2.3.4/32'
  # To add IPs post-deploy: helm upgrade omb ... --reuse-values \
  #   --set 'controlPlane.allowedCIDRs[0]=1.2.3.4/32' \
  #   --set 'controlPlane.allowedCIDRs[1]=5.6.7.8/32'
  allowedCIDRs:
    - "0.0.0.0/0"

storage:
  storageClassName: ""
  size: 10Gi
  createStorageClass: false

prometheus:
  enabled: true

clusterAutoscaler:
  enabled: false
  clusterName: ""
  region: ""
  roleArn: ""

driverJob:
  enabled: false

# kube-prometheus-stack subchart values
kube-prometheus-stack:
  alertmanager:
    enabled: false
  prometheus:
    prometheusSpec:
      nodeSelector:
        node-pool: control-plane
      additionalScrapeConfigsSecret:
        enabled: true
        name: omb-prometheus-additional-scrape-configs
        key: additional-scrape-configs.yaml
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 500m
          memory: 1Gi
      retention: 7d
  grafana:
    nodeSelector:
      node-pool: control-plane
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    service:
      type: LoadBalancer
    # IMPORTANT: always override this before deploying in customer engagements
    # helm install/upgrade ... --set kube-prometheus-stack.grafana.adminPassword=<password>
    adminPassword: changeme
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: redpanda
            orgId: 1
            folder: Redpanda
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/redpanda
    extraConfigmapMounts:
      - name: redpanda-dashboard
        mountPath: /var/lib/grafana/dashboards/redpanda
        configMap: omb-redpanda-dashboard
        readOnly: true
  prometheusOperator:
    nodeSelector:
      node-pool: control-plane
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
  kube-state-metrics:
    nodeSelector:
      node-pool: control-plane
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
  prometheus-node-exporter:
    # DaemonSet — no nodeSelector, must run on all nodes including tainted workers.
    tolerations:
      - key: dedicated
        operator: Equal
        value: benchmark
        effect: NoSchedule
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
