name: Redpanda
driverClass: io.openmessaging.benchmark.driver.redpanda.RedpandaBenchmarkDriver

replicationFactor: 3
reset: false

commonConfig: ""

topicConfig: |
  min.insync.replicas=3

producerConfig: |
  acks=all
  max.in.flight.requests.per.connection=1
  batch.size=131072
  linger.ms=1
  compression.type=lz4

consumerConfig: |
  fetch.min.bytes=1
  fetch.max.wait.ms=500
