<svg width="100%" viewBox="0 0 680 880" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>omb-k8s architecture</title>
  <desc>Two node pool k8s cluster architecture showing control plane pool with management pods and worker pool with one benchmark worker per node, connected via VPC peering to a target Redpanda cluster</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, sans-serif; fill: #3d3d3a; }
      .th { font-size: 14px; font-weight: 500; }
      .ts { font-size: 12px; font-weight: 400; }
      .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
      .c-purple .th { fill: #3C3489; }
      .c-purple .ts { fill: #534AB7; }
      .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
      .c-teal .th { fill: #085041; }
      .c-teal .ts { fill: #0F6E56; }
      .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
      .c-blue .th { fill: #0C447C; }
      .c-blue .ts { fill: #185FA5; }
      .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
      .c-amber .th { fill: #633806; }
      .c-amber .ts { fill: #854F0B; }
      .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
      .c-coral .th { fill: #712B13; }
      .c-coral .ts { fill: #993C1D; }
      .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
      .c-gray .th { fill: #444441; }
      .c-gray .ts { fill: #5F5E5A; }
      .label-muted { fill: #888780; }
      .label-secondary { fill: #5F5E5A; }
      @media (prefers-color-scheme: dark) {
        text { fill: #c2c0b6; }
        .c-purple rect { fill: #3C3489; stroke: #AFA9EC; }
        .c-purple .th { fill: #CECBF6; }
        .c-purple .ts { fill: #AFA9EC; }
        .c-teal rect { fill: #085041; stroke: #5DCAA5; }
        .c-teal .th { fill: #9FE1CB; }
        .c-teal .ts { fill: #5DCAA5; }
        .c-blue rect { fill: #0C447C; stroke: #85B7EB; }
        .c-blue .th { fill: #B5D4F4; }
        .c-blue .ts { fill: #85B7EB; }
        .c-amber rect { fill: #633806; stroke: #EF9F27; }
        .c-amber .th { fill: #FAC775; }
        .c-amber .ts { fill: #EF9F27; }
        .c-coral rect { fill: #712B13; stroke: #F0997B; }
        .c-coral .th { fill: #F5C4B3; }
        .c-coral .ts { fill: #F0997B; }
        .c-gray rect { fill: #444441; stroke: #B4B2A9; }
        .c-gray .th { fill: #D3D1C7; }
        .c-gray .ts { fill: #B4B2A9; }
        .label-muted { fill: #888780; }
        .label-secondary { fill: #B4B2A9; }
      }
    </style>
  </defs>

  <!-- Outer VPC boundary -->
  <rect x="20" y="20" width="640" height="672" rx="18" fill="none" stroke="#888780" stroke-width="1.5" stroke-dasharray="8 4"/>
  <text class="ts label-muted" x="38" y="42">AWS VPC</text>
  <text class="ts label-muted" x="38" y="58">EKS cluster</text>

  <!-- Control plane node pool -->
  <rect x="38" y="68" width="622" height="236" rx="12" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 3"/>
  <text class="th label-secondary" x="56" y="88">Control plane node pool</text>
  <text class="ts label-muted" x="56" y="104">m5.xlarge  ·  fixed 2 nodes  ·  no autoscaling</text>

  <!-- CP Node 1 -->
  <g class="c-gray">
    <rect x="56" y="114" width="286" height="172" rx="10" stroke-width="0.5"/>
    <text class="th" x="199" y="134" text-anchor="middle">Node cp-1</text>
    <text class="ts" x="199" y="150" text-anchor="middle">m5.xlarge</text>
  </g>
  <g class="c-purple">
    <rect x="70" y="160" width="258" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="199" y="178" text-anchor="middle">control-plane</text>
    <text class="ts" x="199" y="194" text-anchor="middle">FastAPI + React  ·  SQLite on PV</text>
  </g>
  <g class="c-teal">
    <rect x="70" y="214" width="122" height="36" rx="8" stroke-width="0.5"/>
    <text class="th" x="131" y="228" text-anchor="middle">prometheus</text>
    <text class="ts" x="131" y="242" text-anchor="middle">1 pod</text>
  </g>
  <g class="c-teal">
    <rect x="206" y="214" width="122" height="36" rx="8" stroke-width="0.5"/>
    <text class="th" x="267" y="228" text-anchor="middle">grafana</text>
    <text class="ts" x="267" y="242" text-anchor="middle">1 pod</text>
  </g>
  <rect x="70" y="262" width="122" height="22" rx="6" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 2"/>
  <text class="ts label-muted" x="131" y="277" text-anchor="middle">PersistentVolume</text>
  <line x1="131" y1="258" x2="131" y2="262" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="2 2"/>

  <!-- CP Node 2 -->
  <g class="c-gray">
    <rect x="358" y="114" width="286" height="172" rx="10" stroke-width="0.5"/>
    <text class="th" x="501" y="134" text-anchor="middle">Node cp-2</text>
    <text class="ts" x="501" y="150" text-anchor="middle">m5.xlarge</text>
  </g>
  <g class="c-amber">
    <rect x="372" y="160" width="258" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="501" y="178" text-anchor="middle">cluster-autoscaler</text>
    <text class="ts" x="501" y="194" text-anchor="middle">watches worker pool only</text>
  </g>
  <g class="c-coral">
    <rect x="372" y="214" width="258" height="36" rx="8" stroke-width="0.5" stroke-dasharray="5 3"/>
    <text class="th" x="501" y="228" text-anchor="middle">driver Job</text>
    <text class="ts" x="501" y="244" text-anchor="middle">ephemeral  ·  OMB_MODE=driver</text>
  </g>

  <!-- Worker node pool -->
  <rect x="38" y="320" width="622" height="358" rx="12" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 3"/>
  <text class="th label-secondary" x="56" y="340">Worker node pool</text>
  <text class="ts label-muted" x="56" y="356">m5.4xlarge  ·  autoscales 0–20  ·  taint: dedicated=benchmark:NoSchedule</text>

  <!-- Worker Node 1 -->
  <g class="c-gray">
    <rect x="56" y="366" width="184" height="126" rx="10" stroke-width="0.5"/>
    <text class="th" x="148" y="386" text-anchor="middle">Node w-1</text>
    <text class="ts" x="148" y="401" text-anchor="middle">m5.4xlarge</text>
  </g>
  <g class="c-blue">
    <rect x="70" y="410" width="156" height="68" rx="8" stroke-width="0.5"/>
    <text class="th" x="148" y="432" text-anchor="middle">omb-worker-0</text>
    <text class="ts" x="148" y="448" text-anchor="middle">hostNetwork: true</text>
    <text class="ts" x="148" y="464" text-anchor="middle">port 8080</text>
  </g>

  <!-- Worker Node 2 -->
  <g class="c-gray">
    <rect x="256" y="366" width="184" height="126" rx="10" stroke-width="0.5"/>
    <text class="th" x="348" y="386" text-anchor="middle">Node w-2</text>
    <text class="ts" x="348" y="401" text-anchor="middle">m5.4xlarge</text>
  </g>
  <g class="c-blue">
    <rect x="270" y="410" width="156" height="68" rx="8" stroke-width="0.5"/>
    <text class="th" x="348" y="432" text-anchor="middle">omb-worker-1</text>
    <text class="ts" x="348" y="448" text-anchor="middle">hostNetwork: true</text>
    <text class="ts" x="348" y="464" text-anchor="middle">port 8080</text>
  </g>

  <!-- Worker Node 3 -->
  <g class="c-gray">
    <rect x="456" y="366" width="184" height="126" rx="10" stroke-width="0.5"/>
    <text class="th" x="548" y="386" text-anchor="middle">Node w-3</text>
    <text class="ts" x="548" y="401" text-anchor="middle">m5.4xlarge</text>
  </g>
  <g class="c-blue">
    <rect x="470" y="410" width="156" height="68" rx="8" stroke-width="0.5"/>
    <text class="th" x="548" y="432" text-anchor="middle">omb-worker-2</text>
    <text class="ts" x="548" y="448" text-anchor="middle">hostNetwork: true</text>
    <text class="ts" x="548" y="464" text-anchor="middle">port 8080</text>
  </g>

  <!-- Autoscale note -->
  <rect x="56" y="506" width="622" height="52" rx="8" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text class="ts label-muted" x="367" y="526" text-anchor="middle">Cluster Autoscaler adds node w-N for each additional worker replica</text>
  <text class="ts label-muted" x="367" y="546" text-anchor="middle">Pod anti-affinity (requiredDuringScheduling on kubernetes.io/hostname) enforces 1 pod per node</text>

  <!-- hostNetwork note -->
  <rect x="56" y="568" width="622" height="52" rx="6" fill="none" stroke="#B4B2A9" stroke-width="0.5"/>
  <text class="ts label-muted" x="367" y="588" text-anchor="middle">hostNetwork: true — workers use the node network stack directly, bypassing CNI overhead</text>
  <text class="ts label-muted" x="367" y="608" text-anchor="middle">Only one pod can bind :8080 per host — enforced by anti-affinity above</text>

  <!-- VPC peering arrow -->
  <line x1="340" y1="702" x2="340" y2="756" stroke="#888780" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrow)"/>
  <text class="ts label-muted" x="360" y="734">VPC peering  ·  :9092</text>

  <!-- Target cluster -->
  <rect x="100" y="760" width="480" height="76" rx="14" fill="none" stroke="#888780" stroke-width="1.5" stroke-dasharray="8 4"/>
  <text class="th label-secondary" x="340" y="788" text-anchor="middle">Target cluster VPC</text>
  <text class="ts label-muted" x="340" y="806" text-anchor="middle">BYOC — 1 bootstrap server  ·  TLS + SASL required</text>
  <text class="ts label-muted" x="340" y="822" text-anchor="middle">Self-hosted — multiple seed brokers  ·  TLS + SASL optional</text>

  <!-- Legend -->
  <g class="c-purple"><rect x="56" y="852" width="10" height="10" rx="2"/></g>
  <text class="ts label-secondary" x="72" y="862">control plane</text>
  <g class="c-blue"><rect x="178" y="852" width="10" height="10" rx="2"/></g>
  <text class="ts label-secondary" x="194" y="862">workers</text>
  <g class="c-teal"><rect x="268" y="852" width="10" height="10" rx="2"/></g>
  <text class="ts label-secondary" x="284" y="862">monitoring</text>
  <g class="c-coral"><rect x="378" y="852" width="10" height="10" rx="2"/></g>
  <text class="ts label-secondary" x="394" y="862">ephemeral Job</text>
  <g class="c-amber"><rect x="494" y="852" width="10" height="10" rx="2"/></g>
  <text class="ts label-secondary" x="510" y="862">autoscaler</text>
</svg>
